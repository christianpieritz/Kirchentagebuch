<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predigt·Miniaturen</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2F5496"> 
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Predigtminiatur">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="icon" href="icon-192.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
  
    <style>
        :root {
            --blue: #2F5496;
            --gold: #7A5C2E;
            --bg: #fdfbf7;
            --dark: #2F4F4F;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--dark);
            font-family: 'Times New Roman', Times, serif;
            letter-spacing: 0.02em;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 15px;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        h1, .cover p, .title, .text-red-caps, .text-red-allcaps, .share-btn, nav a, .impuls-title {
            font-family: 'Cinzel', serif;
            letter-spacing: 0.1em;
        }

        .container {
            width: 100%;
            max-width: 430px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        h1 {
            color: var(--gold);
            font-size: clamp(22px, 7vw, 30px);
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
        }

        .cover {
            position: relative;
            width: 100%;
        }

        .cover img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }

        .cover p {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            text-align: center;
            color: var(--gold);
            font-size: clamp(16px, 4.5vw, 20px);
            font-weight: bold;
            line-height: 1.4;
        }

        .intro {
            font-size: clamp(15px, 4.5vw, 17px);
            line-height: 1.6;
            text-align: center;
        }

        /* === DYNAMISCHER IMPULS BEREICH === */
        .impuls-box {
            width: 100%;
            background-color: #ffffff;
            border: 1px solid rgba(122, 92, 46, 0.2);
            border-radius: 6px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .impuls-date {
            font-size: 14px;
            color: var(--gold);
            margin-bottom: 5px;
            font-weight: bold;
        }

        .impuls-title {
            font-size: 18px;
            color: #A42A04; /* Geändert für Kurztitel */
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .impuls-content {
            font-size: 16.5px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .impuls-link {
            display: inline-block;
            background-color: #A42A04; /* Geändert für Button-Hintergrund */
            color: var(--bg);
            text-decoration: none;
            padding: 12px 25px;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .impuls-link:active {
            background-color: #5E4622;
        }

        .nav-grid {
            width: 100%;
        }

        .nav-item.impressum {
            display: block;
            text-align: center;
            background-color: var(--gold); 
            color: var(--bg);
            text-decoration: none;
            padding: 12px 20px;
            font-size: 15px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .install-inline {
            display: none;
            background: none;
            border: none;
            padding: 0;
            margin: 0;
            color: var(--gold);
            font: inherit;
            cursor: pointer;
        }
        .install-inline.visible {
            display: inline;
        }

        .ios-hint {
            position: fixed;
            inset: 0;
            background: rgba(47, 79, 79, 0.45);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
        }
        .ios-hint[hidden] {
            display: none;
        }
        .ios-hint-box {
            background: var(--bg);
            color: var(--dark);
            width: 100%;
            max-width: 430px;
            padding: 24px 22px 28px;
            border-radius: 18px 18px 0 0;
            text-align: center;
            font-size: 14.5px;
            line-height: 1.65;
        }
        .ios-hint-box strong {
            color: var(--gold);
        }
        .ios-hint-box button {
            margin-top: 16px;
            background: var(--blue);
            color: var(--bg);
            border: none;
            padding: 11px 26px;
            border-radius: 999px;
            font-family: 'Cinzel', serif;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
        }

        footer img {
            max-width: 120px;
            height: auto;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Predigt · Miniaturen</h1>
        
        <div class="cover">
            <img src="Cover.jpg" alt="Cover">
            <p>aus den Kaiserbädern<br>auf Usedom</p>
        </div>
        
        <div class="text-red-caps" style="font-size: 150%; text-align: center;">
            <b>Kaiser·Bäder·Kirche</b>
        </div>
        
        <p class="intro">
            Als App für jeden Sonntag:
            <button id="installBtn" class="install-inline" type="button" hidden>(Hier zum Homescreen hinzufügen.)</button>
        </p>

        <div id="impulsBereich" class="impuls-box">
            <div id="impulsDatum" class="impuls-date">Bitte warten...</div>
            <div id="impulsTitel" class="impuls-title">Impuls wird geladen</div>
            <div id="impulsText" class="impuls-content">Hier erscheint gleich der aktuelle Sonntagsgruß.</div>
            <a id="impulsLink" href="#" class="impuls-link">Weiterlesen</a>
        </div>

        <nav class="nav-grid">
            <a href="kontakt.html" class="nav-item impressum">Kontakt</a>
        </nav>

        <footer>
            <img src="siegel.png" alt="Siegel">
        </footer>
    </div>

    <div id="iosHint" class="ios-hint" hidden>
        <div class="ios-hint-box">
            <p>
                Tippe auf <strong>Teilen</strong>
                und wähle 
                <strong>„Zum Home-Bildschirm“</strong>.
            </p>
            <button id="iosHintClose" type="button">Okay</button>
        </div>
    </div>

    <script>
    (function () {
        // 1. DATENBANK FÜR DEINE SONNTAGE (Hier einfach erweitern/anpassen!)
        // WICHTIG: Das Datum im Format "YYYY-MM-DD" eintragen
        const impulse = [
            {
                datum: "2026-06-01", 
                titel: "Handgepäck·Glaube",
                vorschau: "Glauben für die Hosentasche…",
                zielUrl: "glaubetogo.html"
            },
            {
                datum: "2026-06-25", 
                titel: "RaucherGlaube",
                vorschau: "Darf man beim Beten rauchen?",
                zielUrl: "pfeife.html"
            },
            {
                datum: "2026-06-26", // Dritter Sonntag
                titel: "Platzhalter",
                vorschau: "Platzhalter",
                zielUrl: "platzhalter.html"
            }
            // Du kannst hier beliebig viele Sonntage nach dem gleichen Muster anfügen!
        ];

        // 2. FUNKTION ZUM FINDEN DES AKTUELLEN IMPULSES
        function updateImpuls() {
            const heute = new Date();
            // Erzeuge ein "YYYY-MM-DD" Format aus der heutigen Server-/Gerätezeit
            const heuteString = heute.toISOString().split('T')[0];

            let aktuellerImpuls = null;

            // Wir suchen den neuesten Impuls, dessen Datum bereits erreicht oder vergangen ist
            for (let i = 0; i < impulse.length; i++) {
                if (heuteString >= impulse[i].datum) {
                    aktuellerImpuls = impulse[i];
                }
            }

            // Fallback, falls noch kein Datum aus der Liste erreicht wurde (zeigt den ersten Eintrag an)
            if (!aktuellerImpuls && impulse.length > 0) {
                aktuellerImpuls = impulse[0];
            }

            // HTML Elemente befüllen
            if (aktuellerImpuls) {
                // Datum schön formatieren (DD.MM.YYYY)
                const d = new Date(aktuellerImpuls.datum);
                const formatiertesDatum = d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
                
                document.getElementById('impulsDatum').innerText = "Sonntag, " + formatiertesDatum;
                document.getElementById('impulsTitel').innerText = aktuellerImpuls.titel;
                document.getElementById('impulsText').innerText = aktuellerImpuls.vorschau;
                document.getElementById('impulsLink').href = aktuellerImpuls.zielUrl;
            }
        }

        // Ausführen beim Laden der Seite
        updateImpuls();

        // --- PWA / iOS Code (unverändert aus deinem Original) ---
        const installBtn = document.getElementById('installBtn');
        const iosHint = document.getElementById('iosHint');
        const iosHintClose = document.getElementById('iosHintClose');

        const isStandalone =
            window.matchMedia('(display-mode: standalone)').matches ||
            window.navigator.standalone === true;

        if (isStandalone) return;

        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        let deferredPrompt = null;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.hidden = false;
            installBtn.classList.add('visible');
        });

        if (isIOS) {
            installBtn.hidden = false;
            installBtn.classList.add('visible');
        }

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                deferredPrompt = null;
                installBtn.hidden = true;
            } else if (isIOS) {
                iosHint.hidden = false;
            }
        });

        iosHintClose?.addEventListener('click', () => {
            iosHint.hidden = true;
        });

        window.addEventListener('appinstalled', () => {
            installBtn.hidden = true;
        });
    })();
    </script>
    <script src="register.js"></script>
</body>
</html>
